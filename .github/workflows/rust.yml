name: CI Build

on:
  push:
    branches: [ main ]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build and Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix :
        features: ["", regex]
        os: [ubuntu-latest]
    steps:
      - name: Git Checkout
        uses: actions/checkout@v6
      - name: Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cargo Test
        run: cargo test --workspace --verbose --features "${{ matrix.features }}"

  unstable-features:
    name: Test unstable features
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: unstable-fs
        run: cargo test -p turmoil --features unstable-fs --test fs
      - name: unstable-io_uring (sim)
        run: cargo test -p turmoil --features unstable-io_uring --test fs --test io_uring_conformance
      - name: unstable-io_uring (real Linux ring)
        run: cargo test -p turmoil --features unstable-io_uring,real-uring-conformance --test io_uring_conformance
      - name: unstable-barriers
        run: cargo test -p turmoil --features unstable-barriers --test barriers
      - name: parity check vs real io-uring crate
        run: cargo check -p turmoil --features unstable-io_uring --tests
        env:
          RUSTFLAGS: --cfg=parity_io_uring
      - name: turmoil-io_uring without fs feature compiles
        run: cargo check -p turmoil-io_uring

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Run Clippy
    runs-on: ${{ matrix.os }}
    strategy:
      matrix :
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v6
      - name: Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run cargo clippy
        run: cargo clippy -p turmoil -p turmoil-net -p turmoil-fs -p turmoil-io_uring --all-targets -- --deny warnings

  semver:
    name: semver
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check semver
        uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          package: turmoil

  external-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2025-10-18
      - name: Install cargo-check-external-types
        uses: taiki-e/cache-cargo-install-action@v2
        with:
          tool: cargo-check-external-types@0.4.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo check-external-types --all-features --manifest-path crates/turmoil/Cargo.toml
